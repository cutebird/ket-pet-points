<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灿灿鼎鼎学习星</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #007AFF;
    --primary-light: #E3F0FF;
    --success: #34C759;
    --danger: #FF3B30;
    --warning: #FF9500;
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --text: #1C1C1E;
    --text-sub: #8E8E93;
    --border: #E5E5EA;
    --radius: 16px;
    --radius-sm: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); font-family: -apple-system, "PingFang SC", "SF Pro Text", sans-serif; color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }
  .hidden { display: none !important; }

  /* ── 导航栏 ── */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid rgba(0,0,0,0.12); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0 6px; cursor: pointer; color: #8E8E93; font-size: 10px; gap: 2px; border: none; background: none; transition: color .15s; }
  .nav-btn .icon { font-size: 24px; line-height: 1; }
  .nav-btn.active { color: var(--primary); }

  /* ── 通用 ── */
  .page { padding: 16px 16px 88px; min-height: 100vh; }
  .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-sub { color: var(--text-sub); font-size: 13px; margin-bottom: 18px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .section-title { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .6px; }
  .btn { border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 15px; font-weight: 600; padding: 0 20px; height: 50px; line-height: 50px; text-align: center; transition: opacity .15s, transform .1s; }
  .btn:active { opacity: .8; transform: scale(.98); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-block { display: block; width: 100%; }
  .text-pos { color: var(--success); }
  .text-neg { color: var(--danger); }
  .text-warn { color: var(--warning); }
  .empty { text-align: center; padding: 60px 0; color: var(--text-sub); }
  .empty .eicon { font-size: 48px; display: block; margin-bottom: 8px; }
  .loading { text-align: center; padding: 40px 0; color: var(--text-sub); }
  .gap { margin-top: 12px; }
  .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(0,122,255,.4); display: flex; align-items: center; justify-content: center; z-index: 99; transition: transform .15s; }
  .fab:active { transform: scale(.92); }

  /* ── Login ── */
  #page-login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; background: var(--bg); }
  .login-logo { font-size: 72px; margin-bottom: 12px; }
  .login-app-name { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  .login-tagline { font-size: 14px; color: var(--text-sub); margin-bottom: 40px; }
  .login-form { width: 100%; max-width: 340px; }
  .login-field { margin-bottom: 14px; }
  .login-label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .5px; }
  .login-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 16px; color: var(--text); outline: none; transition: border-color .15s; }
  .login-input:focus { border-color: var(--primary); }
  .login-btn { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); height: 52px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity .15s, transform .1s; }
  .login-btn:active { opacity: .85; transform: scale(.98); }
  .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  .login-guest-btn { width: 100%; background: none; border: none; color: var(--text-sub); font-size: 14px; cursor: pointer; margin-top: 14px; padding: 8px; text-decoration: underline; text-underline-offset: 3px; }

  /* ── 课次卡片 ── */
  .session-banner { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: linear-gradient(135deg, #007AFF, #5AC8FA); border-radius: var(--radius); color: #fff; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,122,255,.3); }
  .session-banner.inactive { background: linear-gradient(135deg, #8E8E93, #AEAEB2); box-shadow: none; }
  .sb-left .sb-status { font-size: 12px; opacity: .85; margin-bottom: 2px; }
  .sb-left .sb-label { font-size: 17px; font-weight: 700; }
  .sb-btn { background: rgba(255,255,255,0.25); color: #fff; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* ── 看板页 ── */
  .score-card { margin-bottom: 14px; cursor: pointer; transition: transform .15s; }
  .score-card:active { transform: scale(.98); }
  .score-card.lead { border: 2px solid var(--primary); }
  .sc-top { display: flex; align-items: center; margin-bottom: 14px; }
  .sc-avatar { font-size: 48px; margin-right: 14px; line-height: 1; }
  .sc-name { font-size: 22px; font-weight: 700; }
  .sc-badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
  .sc-scores { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 14px 0; }
  .sc-score { flex: 1; text-align: center; }
  .sc-score + .sc-score { border-left: 0.5px solid var(--border); }
  .sc-num { font-size: 30px; font-weight: 700; color: var(--primary); display: block; }
  .sc-num.total { color: var(--text); font-size: 24px; }
  .sc-num.redeemed { color: var(--warning); font-size: 24px; }
  .sc-label { font-size: 12px; color: var(--text-sub); margin-top: 2px; display: block; }
  .sc-footer { text-align: right; margin-top: 12px; font-size: 13px; color: var(--primary); font-weight: 500; }

  /* ── 详情页 ── */
  .back-btn { display: flex; align-items: center; gap: 4px; color: var(--primary); font-size: 16px; cursor: pointer; margin-bottom: 16px; background: none; border: none; padding: 0; font-weight: 500; }
  .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .fchip { flex-shrink: 0; font-size: 13px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-sub); cursor: pointer; white-space: nowrap; }
  .fchip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .event-item { display: flex; align-items: flex-start; padding: 14px 16px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 2px; }
  .event-item + .event-item { border-top: 0.5px solid var(--border); border-radius: 0; }
  .event-item:first-child { border-top-left-radius: var(--radius-sm); border-top-right-radius: var(--radius-sm); }
  .event-item:last-child { border-bottom-left-radius: var(--radius-sm); border-bottom-right-radius: var(--radius-sm); }
  .ev-icon { font-size: 28px; margin-right: 12px; flex-shrink: 0; }
  .ev-info { flex: 1; }
  .ev-label { font-size: 15px; font-weight: 500; }
  .ev-time { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .ev-note { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
  .ev-points { font-size: 22px; font-weight: 700; }
  .load-more-btn { width: 100%; padding: 14px; text-align: center; color: var(--primary); background: var(--card); border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 10px; box-shadow: var(--shadow); }

  /* ── 记录积分页 ── */
  .add-page .card { margin-bottom: 12px; }
  .step-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .stu-btns { display: flex; gap: 10px; }
  .stu-btn { flex: 1; padding: 14px 10px; text-align: center; border-radius: var(--radius-sm); border: 2px solid transparent; background: var(--bg); color: var(--text-sub); cursor: pointer; font-size: 15px; transition: all .15s; }
  .stu-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
  .cat-group-label { font-size: 12px; color: var(--text-sub); font-weight: 600; margin: 10px 0 8px; text-transform: uppercase; letter-spacing: .5px; }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 14px; padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; transition: all .15s; }
  .cat-chip.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
  .ans-btns { display: flex; gap: 10px; margin-bottom: 14px; }
  .ans-btn { flex: 1; padding: 14px 10px; text-align: center; border-radius: var(--radius-sm); border: 2px solid transparent; background: var(--bg); color: var(--text-sub); cursor: pointer; font-size: 15px; transition: all .15s; }
  .ans-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
  .points-preview { display: flex; align-items: center; background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; }
  .pp-label { font-size: 14px; color: var(--text-sub); }
  .pp-num { font-size: 34px; font-weight: 700; margin-left: 12px; }
  .points-input-wrap { display: flex; align-items: center; background: var(--bg); border-radius: var(--radius-sm); padding: 4px 16px; }
  .points-input { flex: 1; font-size: 30px; font-weight: 700; border: none; background: transparent; color: var(--text); outline: none; height: 52px; }
  .points-unit { font-size: 14px; color: var(--text-sub); }
  .note-input { width: 100%; border: none; background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 15px; color: var(--text); outline: none; resize: none; min-height: 64px; font-family: inherit; }
  .session-hint { margin-bottom: 12px; padding: 12px 16px; background: var(--primary-light); border-radius: var(--radius-sm); font-size: 13px; color: var(--primary); font-weight: 500; }
  .session-hint.warn { background: #FFF3E0; color: var(--warning); }

  /* ── 删除事件 (仅 admin) ── */
  .ev-del-btn { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; flex-shrink: 0; }

  /* ── 排行/课次页 ── */
  .tabs { display: flex; background: rgba(120,120,128,0.12); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 18px; }
  .tab { flex: 1; text-align: center; padding: 9px 0; font-size: 14px; font-weight: 500; color: var(--text-sub); border-radius: 10px; cursor: pointer; transition: all .2s; }
  .tab.active { background: var(--card); color: var(--text); font-weight: 700; box-shadow: 0 1px 8px rgba(0,0,0,0.1); }
  .rank-item { display: flex; align-items: center; padding: 16px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 10px; box-shadow: var(--shadow); }
  .rank-num { font-size: 22px; font-weight: 700; width: 36px; text-align: center; color: #C7C7CC; }
  .rank-num.g1 { color: #FFD700; }
  .rank-num.g2 { color: #A8A8A8; }
  .rank-avatar { font-size: 36px; margin: 0 12px; }
  .rank-info { flex: 1; }
  .rank-name { font-size: 17px; font-weight: 600; }
  .rank-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .rank-pts { font-size: 28px; font-weight: 700; color: var(--primary); }
  .rank-unit { font-size: 13px; color: var(--text-sub); font-weight: 400; }
  .bar-row { display: flex; align-items: center; margin-bottom: 12px; }
  .bar-name { font-size: 13px; color: var(--text-sub); width: 70px; font-weight: 500; }
  .bar-wrap { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; margin: 0 10px; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #5AC8FA); border-radius: 5px; transition: width .5s cubic-bezier(.4,0,.2,1); min-width: 3px; }
  .bar-val { font-size: 14px; font-weight: 600; color: var(--primary); width: 38px; text-align: right; }

  /* ── 课次曲线 ── */
  .chart-wrap { width: 100%; overflow-x: auto; }
  canvas#session-chart { display: block; }
  .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 12px; font-size: 14px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .session-list { margin-top: 12px; }
  .sess-item { display: flex; align-items: center; padding: 12px 16px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 8px; box-shadow: var(--shadow); }
  .sess-date { font-size: 14px; font-weight: 600; color: var(--text); min-width: 70px; }
  .sess-label { font-size: 13px; color: var(--text-sub); flex: 1; }
  .sess-pts { display: flex; gap: 12px; }
  .sess-pt { font-size: 13px; font-weight: 700; }

  /* ── 奖励页 ── */
  .stu-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stu-chip { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 20px; border: 2px solid transparent; background: var(--card); color: var(--text-sub); cursor: pointer; font-size: 14px; box-shadow: var(--shadow); transition: all .15s; }
  .stu-chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .stu-chip .chip-pts { font-size: 12px; color: #C7C7CC; font-weight: 500; }
  .stu-chip.active .chip-pts { color: var(--primary); }
  .reward-item { display: flex; align-items: center; padding: 16px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 10px; box-shadow: var(--shadow); }
  .rw-icon { font-size: 40px; margin-right: 14px; }
  .rw-info { flex: 1; }
  .rw-name { font-size: 16px; font-weight: 600; }
  .rw-desc { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
  .rw-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .rw-cost { font-size: 18px; font-weight: 700; color: var(--warning); }
  .rw-btn { background: var(--primary); color: #fff; border: none; border-radius: 20px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .rw-btn:disabled { background: #C7C7CC; cursor: not-allowed; }
  .hist-item { display: flex; align-items: center; padding: 14px 16px; background: var(--card); border-radius: var(--radius-sm); margin-bottom: 8px; box-shadow: var(--shadow); }
  .hi-avatar { font-size: 30px; margin-right: 12px; }
  .hi-info { flex: 1; }
  .hi-desc { font-size: 14px; color: var(--text); font-weight: 500; }
  .hi-time { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .hi-cost { font-size: 18px; font-weight: 700; color: var(--danger); }

  /* ── 赠分 modal ── */
  .gift-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: flex-end; }
  .gift-modal-box { background: var(--card); border-radius: 22px 22px 0 0; width: 100%; padding: 28px 20px calc(28px + env(safe-area-inset-bottom)); }
  .gift-pts-wrap { display: flex; align-items: center; background: var(--bg); border-radius: var(--radius-sm); padding: 4px 16px; margin-bottom: 14px; }
  .gift-pts-input { flex: 1; font-size: 30px; font-weight: 700; border: none; background: transparent; color: var(--primary); outline: none; height: 52px; }
  .gift-note-input { width: 100%; border: none; background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 15px; color: var(--text); outline: none; resize: none; min-height: 56px; font-family: inherit; }

  /* ── 积分 breakdown 展开面板 ── */
  .score-tap { cursor: pointer; }
  .score-tap:active { opacity: .7; }
  .breakdown-panel { margin-top: 16px; border-top: 0.5px solid var(--border); padding-top: 14px; }
  .breakdown-title { font-size: 12px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .breakdown-close { font-size: 18px; color: var(--text-sub); cursor: pointer; padding: 0 4px; }
  .breakdown-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .breakdown-item:last-child { border-bottom: none; }
  .bi-icon { font-size: 22px; margin-right: 10px; flex-shrink: 0; }
  .bi-info { flex: 1; }
  .bi-label { font-size: 14px; font-weight: 500; }
  .bi-time { font-size: 12px; color: var(--text-sub); margin-top: 1px; }
  .bi-note { font-size: 12px; color: var(--text-sub); margin-top: 1px; }
  .bi-pts { font-size: 18px; font-weight: 700; }
  .breakdown-empty { text-align: center; color: var(--text-sub); font-size: 14px; padding: 20px 0; }
  .breakdown-loading { text-align: center; color: var(--text-sub); font-size: 14px; padding: 16px 0; }

  /* ── 排行榜点击展开 ── */
  .rank-item { cursor: pointer; transition: background .15s; }
  .rank-item:active { background: var(--bg); }
  .rank-breakdown { padding: 12px 16px 4px; background: var(--card); border-radius: 0 0 var(--radius-sm) var(--radius-sm); margin-top: -10px; margin-bottom: 10px; border-top: 0.5px solid var(--border); box-shadow: var(--shadow); }

  /* ── Toast ── */
  #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.85); background: rgba(30,30,30,.88); backdrop-filter: blur(10px); color: #fff; padding: 12px 24px; border-radius: 16px; font-size: 15px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* ── Modal (sheet style) ── */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: flex-end; }
  .modal-box { background: var(--card); border-radius: 22px 22px 0 0; width: 100%; padding: 28px 20px calc(28px + env(safe-area-inset-bottom)); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal-body { font-size: 15px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 12px; }
  .modal-cancel { flex: 1; background: var(--bg); color: var(--text); border: none; border-radius: var(--radius-sm); height: 50px; font-size: 16px; font-weight: 500; cursor: pointer; }
  .modal-confirm { flex: 1; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); height: 50px; font-size: 16px; font-weight: 600; cursor: pointer; }

  /* ── 日期选择 modal ── */
  .date-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: flex-end; }
  .date-modal-box { background: var(--card); border-radius: 22px 22px 0 0; width: 100%; padding: 28px 20px calc(28px + env(safe-area-inset-bottom)); }
  .date-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 16px; color: var(--text); outline: none; margin-bottom: 18px; background: var(--bg); }
  .date-input:focus { border-color: var(--primary); background: var(--card); }

  /* ── iPad / 宽屏 ── */
  @media (min-width: 600px) {
    .page { max-width: 540px; margin: 0 auto; padding-left: 20px; padding-right: 20px; }
    #page-login { background: var(--bg); }
    #page-login .login-form { padding: 40px 36px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
    .nav { justify-content: center; }
    .nav-btn { max-width: 120px; }
    .fab { right: calc((100vw - 540px)/2 + 20px); }
  }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div id="modal" class="modal-mask hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">取消</button>
      <button class="modal-confirm" id="modal-confirm">确认</button>
    </div>
  </div>
</div>

<!-- 赠分 Modal -->
<div id="gift-modal" class="gift-modal-mask hidden" onclick="if(event.target===this)closeGiftModal()">
  <div class="gift-modal-box">

function fmtDateTime(str) {
  const d = new Date(str)
  const m = String(d.getMonth()+1).padStart(2,'0')
  const day = String(d.getDate()).padStart(2,'0')
  const h = String(d.getHours()).padStart(2,'0')
  const min = String(d.getMinutes()).padStart(2,'0')
  return `${m}-${day} ${h}:${min}`
}
function fmtDate(str) { return str ? str.slice(0, 10) : '' }
function fmtPts(p) { return p > 0 ? `+${p}` : `${p}` }
function ptsClass(p) { return p >= 0 ? 'text-pos' : 'text-neg' }
function todayStr() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}
function isAdmin() { return state.currentUser && state.currentUser.role === 'admin' }

let toastTimer
function showToast(msg, duration=2000) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), duration)
}

function showModal(title, body, onConfirm) {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').textContent = body
  document.getElementById('modal').classList.remove('hidden')
  document.getElementById('modal-confirm').onclick = () => {
    document.getElementById('modal').classList.add('hidden')
    onConfirm()
  }
  document.getElementById('modal-cancel').onclick = () => {
    document.getElementById('modal').classList.add('hidden')
  }
}

function calcAnswerScore(cat, result) {
  const c = EVENT_CATEGORIES[cat]
  if (!c || c.group !== 'answer') return 0
  return c.fullScore * ANSWER_RESULTS[result].mul
}

// ── 修改密码 ──────────────────────────────
let pwdTargetUser = 'admin'

function openPwdModal() {
  if (!isAdmin()) return
  pwdTargetUser = 'admin'
  document.getElementById('pwd-new').value = ''
  document.getElementById('pwd-confirm').value = ''
  document.getElementById('pwd-error').textContent = ''
  renderPwdUserBar()
  document.getElementById('pwd-modal').classList.remove('hidden')
}

function closePwdModal() {
  document.getElementById('pwd-modal').classList.add('hidden')
}

function renderPwdUserBar() {
  const users = [
    { key: 'admin',    label: '老师 👩‍🏫' },
    { key: 'cancan',   label: '灿灿 🌟' },
    { key: 'dingding', label: '鼎鼎 ⭐' },
  ]
  document.getElementById('pwd-user-bar').innerHTML = users.map(u =>
    `<div class="fchip ${pwdTargetUser === u.key ? 'active' : ''}" onclick="selectPwdUser('${u.key}')">${u.label}</div>`
  ).join('')
  document.getElementById('pwd-user-label').textContent = `修改 ${users.find(u => u.key === pwdTargetUser).label} 的密码`
}

function selectPwdUser(key) {
  pwdTargetUser = key
  document.getElementById('pwd-new').value = ''
  document.getElementById('pwd-confirm').value = ''
  document.getElementById('pwd-error').textContent = ''
  renderPwdUserBar()
}

function confirmPwdChange() {
  const newPwd = document.getElementById('pwd-new').value
  const confirmPwd = document.getElementById('pwd-confirm').value
  const errEl = document.getElementById('pwd-error')
  if (!newPwd) { errEl.textContent = '请输入新密码'; return }
  if (newPwd.length < 4) { errEl.textContent = '密码至少4位'; return }
  if (newPwd !== confirmPwd) { errEl.textContent = '两次输入不一致'; return }
  ACCOUNTS[pwdTargetUser].password = newPwd
  const saved = JSON.parse(localStorage.getItem('pwd_overrides') || '{}')
  saved[pwdTargetUser] = newPwd
  localStorage.setItem('pwd_overrides', JSON.stringify(saved))
  closePwdModal()
  showToast('密码已修改 ✓')
}

function doLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase()
  const password = document.getElementById('login-password').value
  const errEl = document.getElementById('login-error')
  const account = ACCOUNTS[username]
  if (!account || account.password !== password) {
    errEl.textContent = '用户名或密码错误'
    return
  }
  errEl.textContent = ''
  state.currentUser = { username, ...account }
  state.lbData = null
  enterApp()
}

    const { data } = await sb.from('sessions').select('*').eq('is_active', true).maybeSingle()
    state.activeSession = data || null
  } catch(e) {
    state.activeSession = null
  }
}

function renderSessionBanner() {
  // 只有 admin 才能看到/操作课次 banner
  const wrap = document.getElementById('session-banner-wrap')
  if (!wrap) return
  if (!isAdmin()) { wrap.innerHTML = ''; return }
  if (state.activeSession) {
    wrap.innerHTML = `
      <div class="session-banner">
        <div class="sb-left">
          <div class="sb-status">🟢 上课中</div>
          <div class="sb-label">${state.activeSession.label}</div>
        </div>
        <button class="sb-btn" onclick="endSession()">结束上课</button>
      </div>`
  } else {
    wrap.innerHTML = `
      <div class="session-banner inactive">
        <div class="sb-left">
          <div class="sb-status">⚪ 未开始</div>
          <div class="sb-label">今日暂无课次</div>
        </div>
        <button class="sb-btn" onclick="openDateModal()">开始上课</button>
      </div>`
  }
}

function openDateModal() {
  document.getElementById('date-input').value = todayStr()
  document.getElementById('date-modal').classList.remove('hidden')
}
function closeDateModal() {
  document.getElementById('date-modal').classList.add('hidden')
}

async function confirmStartSession() {
  const dateVal = document.getElementById('date-input').value
  if (!dateVal) { showToast('请选择日期'); return }
  closeDateModal()
  await sb.from('sessions').update({ is_active: false }).eq('is_active', true)
  const d = new Date(dateVal + 'T12:00:00')
  const label = `${d.getMonth()+1}月${d.getDate()}日`
  const { data, error } = await sb.from('sessions').insert({
    session_date: dateVal, label, is_active: true
  }).select().single()
  if (error) { showToast('开课失败，请重试'); return }
  state.activeSession = data
  renderSessionBanner()

}

async function endSession() {
  if (!state.activeSession) return
  showModal('结束上课', `确认结束「${state.activeSession.label}」课次？`, async () => {
    const { error } = await sb.from('sessions').update({ is_active: false }).eq('id', state.activeSession.id)
    if (error) { showToast('操作失败'); return }
    state.activeSession = null
    renderSessionBanner()
    showToast('课次已结束 ✓')
  })
}

// ── 赠分 ──────────────────────────────────
let giftTargetId = null

function openGiftModal(targetId, targetName, targetAvatar) {
  giftTargetId = targetId
  document.getElementById('gift-to-label').textContent = `赠给：${targetAvatar} ${targetName}`
  document.getElementById('gift-pts-input').value = ''
  document.getElementById('gift-note-input').value = ''
  document.getElementById('gift-modal').classList.remove('hidden')
  setTimeout(() => document.getElementById('gift-pts-input').focus(), 100)
}

function closeGiftModal() {
  document.getElementById('gift-modal').classList.add('hidden')
  giftTargetId = null
}

async function confirmGift() {
  const u = state.currentUser
  if (!u || u.role !== 'student') return
  const pts = parseInt(document.getElementById('gift-pts-input').value)
  if (!pts || pts <= 0) { showToast('请输入赠送积分数'); return }
  const note = document.getElementById('gift-note-input').value.trim()
  const sender = state.students.find(s => s.id === u.studentId)
  if (!sender) return
  if ((sender.available_points || 0) < pts) { showToast('可用积分不足'); return }

  const btn = document.querySelector('#gift-modal .modal-confirm')
  btn.disabled = true
  btn.textContent = '赠送中…'

  // Insert two point_events: deduct from sender, add to receiver
  const senderNote = `赠给 ${state.students.find(s=>s.id===giftTargetId)?.name || giftTargetId}${note ? '：' + note : ''}`
  const receiverNote = `${sender.name} 赠送${note ? '：' + note : ''}`
  const [r1, r2] = await Promise.all([
    sb.from('point_events').insert({ student_id: u.studentId, category: 'gift', points: -pts, note: senderNote }),
    sb.from('point_events').insert({ student_id: giftTargetId, category: 'gift', points: pts, note: receiverNote }),
  ])
  if (r1.error || r2.error) { showToast('赠送失败，请重试'); btn.disabled = false; btn.textContent = '赠送'; return }

  // Update students table
  await Promise.all([
    sb.from('students').update({ available_points: (sender.available_points || 0) - pts }).eq('id', u.studentId),
    sb.from('students').update({
      available_points: ((state.students.find(s=>s.id===giftTargetId)?.available_points) || 0) + pts,
      total_points: ((state.students.find(s=>s.id===giftTargetId)?.total_points) || 0) + pts,
    }).eq('id', giftTargetId),
  ])

  closeGiftModal()
  showToast(`已赠出 ${pts} 积分 🎁`)
  // Refresh current detail page
  const stuRes = await sb.from('students').select('*').order('id')
  if (!stuRes.error) { state.students = stuRes.data }
  renderDetailProfile()
  loadDetailEvents(true)
}

// ── 详情页 breakdown ──────────────────────
let detailBreakdownType = null   // 'available' | 'total' | null

async function toggleScoreBreakdown(type, studentId) {
  const panel = document.getElementById('detail-breakdown-panel')
  if (!panel) return
  if (detailBreakdownType === type) {
    // Close
    detailBreakdownType = null
    panel.innerHTML = ''
    panel.classList.add('hidden')
    return
  }
  detailBreakdownType = type
  panel.classList.remove('hidden')
  panel.innerHTML = `<div class="breakdown-panel"><div class="breakdown-loading">加载中…</div></div>`
  const label = type === 'available' ? '可用积分来源' : '累计积分来源'
  let q = sb.from('point_events').select('*').eq('student_id', studentId).order('created_at', { ascending: false }).limit(50)
  if (type === 'total') q = q.gt('points', 0)
  const { data, error } = await q
  if (error) { panel.innerHTML = '<div class="breakdown-panel"><div class="breakdown-empty">加载失败</div></div>'; return }
  const items = data.length === 0
    ? '<div class="breakdown-empty">暂无记录</div>'
    : data.map(e => {
        const cat = EVENT_CATEGORIES[e.category] || { label: e.category || '积分', icon: '📌' }
        const pts = e.points > 0 ? `<span class="bi-pts text-pos">+${e.points}</span>` : `<span class="bi-pts text-neg">${e.points}</span>`
        return `<div class="breakdown-item">
          <span class="bi-icon">${cat.icon}</span>
          <div class="bi-info">
            <div class="bi-label">${cat.label}${e.note ? ' · ' + e.note : ''}</div>
            <div class="bi-time">${fmtDateTime(e.created_at)}</div>
          </div>
          ${pts}
        </div>`
      }).join('')
  panel.innerHTML = `<div class="breakdown-panel">
    <div class="breakdown-title">${label} <span class="breakdown-close" onclick="toggleScoreBreakdown('${type}','${studentId}')">✕</span></div>
    ${items}
  </div>`
}

function renderDetailFilter() {
  const chips = [{ key: null, label: '全部' }, ...Object.entries(EVENT_CATEGORIES).map(([k,v]) => ({ key: k, label: v.icon+' '+v.label }))]
  document.getElementById('detail-filter').innerHTML = chips.map(c =>
    `<div class="fchip ${state.detailFilter === c.key ? 'active' : ''}" onclick="setDetailFilter(${c.key ? `'${c.key}'` : 'null'})">${c.label}</div>`
  ).join('')
}

function setDetailFilter(key) {
  state.detailFilter = key
  state.detailEvents = []
  state.detailSkip = 0
  state.detailHasMore = true
  renderDetailFilter()
  loadDetailEvents(true)
}

async function loadDetailEvents(reset) {
  if (!state.detailHasMore && !reset) return
  document.getElementById('detail-loading').classList.toggle('hidden', !reset)
  const PAGE = 20
  let q = sb.from('point_events')
    .select('*')
    .eq('student_id', state.detailStudentId)
    .order('created_at', { ascending: false })
    .range(state.detailSkip, state.detailSkip + PAGE - 1)
  if (state.detailFilter) q = q.eq('category', state.detailFilter)
  const { data, error } = await q
  document.getElementById('detail-loading').classList.add('hidden')
  if (error) { showToast('加载失败'); return }
  state.detailEvents = reset ? data : [...state.detailEvents, ...data]
  state.detailSkip += data.length
  state.detailHasMore = data.length === PAGE
  renderDetailEvents()
}

function renderDetailEvents() {
  const list = document.getElementById('detail-list')
  if (state.detailEvents.length === 0) {
    list.innerHTML = '<div class="empty"><span class="eicon">📭</span>暂无记录</div>'
  } else {
    const grouped = document.createElement('div')
    grouped.style.cssText = 'background:var(--card);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow)'
    grouped.innerHTML = state.detailEvents.map(e => {
      const cat = EVENT_CATEGORIES[e.category] || { label: e.category, icon: '📌' }
      const delBtn = isAdmin()
        ? `<button class="ev-del-btn" onclick="deleteEvent('${e.id}',event)">✕</button>`
        : ''
      return `
      <div class="event-item" data-id="${e.id}">
        <span class="ev-icon">${cat.icon}</span>
        <div class="ev-info">
          <div class="ev-label">${cat.label}</div>
          <div class="ev-time">${fmtDateTime(e.created_at)}</div>
          ${e.note ? `<div class="ev-note">${e.note}</div>` : ''}
        </div>
        <span class="ev-points ${ptsClass(e.points)}">${fmtPts(e.points)}</span>
        ${delBtn}
      </div>`
    }).join('')
    list.innerHTML = ''
    list.appendChild(grouped)
  }
  document.getElementById('detail-more-btn').classList.toggle('hidden', !state.detailHasMore)
}

function loadMoreEvents() { loadDetailEvents(false) }

// 删除积分记录 (admin only)
async function deleteEvent(eventId, domEvent) {
  domEvent.stopPropagation()
  const ev = state.detailEvents.find(e => e.id === eventId)
  if (!ev) return
  const s = state.students.find(x => x.id === ev.student_id)
  const name = s ? s.name : ev.student_id
  showModal('删除记录', `确认删除 ${name} 的「${EVENT_CATEGORIES[ev.category]?.label || ev.category}」记录（${fmtPts(ev.points)} 分）？`, async () => {
    const { error: delErr } = await sb.from('point_events').delete().eq('id', eventId)
    if (delErr) { showToast('删除失败'); return }
    // 回滚积分
    if (s) {
      const pts = ev.points || 0
      const updateData = { available_points: (s.available_points || 0) - pts }
      if (pts > 0) updateData.total_points = (s.total_points || 0) - pts
      await sb.from('students').update(updateData).eq('id', s.id)
      // 更新本地 students
      const idx = state.students.findIndex(x => x.id === s.id)
      if (idx >= 0) state.students[idx] = { ...s, ...updateData }
    }
    showToast('已删除')
    state.detailEvents = state.detailEvents.filter(e => e.id !== eventId)
    renderDetailEvents()
    renderDetailProfile()
  })
}

// 记录积分页

function openAddPage(presetStudentId) {
  if (!isAdmin()) { showToast('无权限操作'); return }
  state.addCategory = null
  state.addAnswerResult = 'correct'
  if (presetStudentId) {
    const idx = state.students.findIndex(s => s.id === presetStudentId)
    state.addStudentIdx = idx >= 0 ? idx : 0
  } else {
    state.addStudentIdx = 0
  }
  showPageOnly('add')
  renderAddSessionHint()
  renderAddStudents()
  renderAddCategories()
  renderAddScoreSection()
}

function renderAddSessionHint() {
  const el = document.getElementById('add-session-hint')
  if (state.activeSession) {
    el.innerHTML = `<div class="session-hint">📚 当前课次：${state.activeSession.label}</div>`
  } else {
    el.innerHTML = `<div class="session-hint warn">⚠️ 未开始课次，积分不会关联课次。可返回看板开始上课。</div>`
  }
}

function renderAddStudents() {
  const btns = [...state.students.map((s,i) => `
    <div class="stu-btn ${state.addStudentIdx === i ? 'active' : ''}" onclick="selectAddStudent(${i})">${s.avatar} ${s.name}</div>
  `), `<div class="stu-btn ${state.addStudentIdx === state.students.length ? 'active' : ''}" onclick="selectAddStudent(${state.students.length})">两人同时</div>`]
  document.getElementById('add-stu-btns').innerHTML = btns.join('')
}

function selectAddStudent(idx) {
  state.addStudentIdx = idx
  renderAddStudents()
}

function renderAddCategories() {
  const groups = {}
  Object.entries(EVENT_CATEGORIES).forEach(([k,v]) => {
    if (!groups[v.group]) groups[v.group] = []
    groups[v.group].push({ key: k, ...v })
  })
  document.getElementById('add-cat-list').innerHTML = Object.entries(groups).map(([g, items]) => `
    <div class="cat-group-label">${GROUP_LABELS[g]}</div>
    <div class="cat-grid">
      ${items.map(c => `
        <div class="cat-chip ${state.addCategory === c.key ? 'active' : ''}" onclick="selectCategory('${c.key}')">
          ${c.icon} ${c.label}
        </div>`).join('')}
    </div>
  `).join('')
}

function selectCategory(key) {
  state.addCategory = key
  renderAddCategories()
  renderAddScoreSection()
}

function renderAddScoreSection() {
  const hasCategory = !!state.addCategory
  document.getElementById('add-score-section').classList.toggle('hidden', !hasCategory)
  document.getElementById('add-note-section').classList.toggle('hidden', !hasCategory)
  document.getElementById('add-submit-wrap').classList.toggle('hidden', !hasCategory)
  if (!hasCategory) return

  const cat = EVENT_CATEGORIES[state.addCategory]
  const isAnswer = cat.group === 'answer'
  const isCheckin = cat.group === 'checkin'
  document.getElementById('add-answer-section').classList.toggle('hidden', !isAnswer)
  document.getElementById('add-checkin-section').classList.toggle('hidden', !isCheckin)
  document.getElementById('add-custom-section').classList.toggle('hidden', isAnswer || isCheckin)

  if (isAnswer) {
    document.getElementById('add-ans-btns').innerHTML = Object.entries(ANSWER_RESULTS).map(([k,v]) =>
      `<div class="ans-btn ${state.addAnswerResult === k ? 'active' : ''}" onclick="selectAnswerResult('${k}')">${v.label}</div>`
    ).join('')
    const pts = calcAnswerScore(state.addCategory, state.addAnswerResult)
    const el = document.getElementById('add-calc-pts')
    el.textContent = fmtPts(pts)
    el.className = 'pp-num ' + ptsClass(pts)
  } else if (isCheckin) {
    document.getElementById('add-checkin-btns').innerHTML = [1,2,3,4,5,6,7].map(d =>
      `<div class="ans-btn ${state.addCheckinDays === d ? 'active' : ''}" onclick="selectCheckinDays(${d})">${d} 天</div>`
    ).join('')
    document.getElementById('add-checkin-pts').textContent = '+' + (state.addCheckinDays * 2)
  } else {
    const defaultPts = cat.defaultPoints || 0
    document.getElementById('add-pts-input').value = defaultPts
  }
}

function selectAnswerResult(result) {
  state.addAnswerResult = result
  renderAddScoreSection()
}

function selectCheckinDays(days) {
  state.addCheckinDays = days
  renderAddScoreSection()
}

async function submitEvent() {
  if (!isAdmin()) { showToast('无权限操作'); return }
  if (!state.addCategory) { showToast('请选择积分类型'); return }
  const cat = EVENT_CATEGORIES[state.addCategory]
  const isAnswer = cat.group === 'answer'
  const isCheckin = cat.group === 'checkin'
  const points = isAnswer
    ? calcAnswerScore(state.addCategory, state.addAnswerResult)
    : isCheckin
      ? state.addCheckinDays * 2
      : (parseInt(document.getElementById('add-pts-input').value) || 0)
  const note = document.getElementById('add-note').value.trim()

  const isBoth = state.addStudentIdx === state.students.length
  const targets = isBoth ? state.students.map(s=>s.id) : [state.students[state.addStudentIdx].id]

  const btn = document.getElementById('add-submit-btn')
  btn.disabled = true
  btn.textContent = '提交中...'

  try {
    for (const studentId of targets) {
      const eventData = {
        student_id: studentId, category: state.addCategory, points, note
      }
      if (state.activeSession) eventData.session_id = state.activeSession.id

      const { error: evErr } = await sb.from('point_events').insert(eventData)
      if (evErr) throw evErr

      const student = state.students.find(s => s.id === studentId)
      const updateData = { available_points: (student.available_points || 0) + points }
      if (points > 0) updateData.total_points = (student.total_points || 0) + points
      const { error: stErr } = await sb.from('students').update(updateData).eq('id', studentId)
      if (stErr) throw stErr
    }
    showToast('记录成功 ✓')
    document.getElementById('add-note').value = ''
    const { data } = await sb.from('students').select('*').order('id')
    if (data) state.students = data
    setTimeout(() => showPage('dashboard'), 1200)
  } catch(e) {
    console.error(e)
    showToast('提交失败，请重试')
  } finally {
    btn.disabled = false
    btn.textContent = '确认记录'
  }
}

// ══════════════════════════════════════
// 对比/排行页
// ══════════════════════════════════════
function switchLbTab(el) {
  document.querySelectorAll('#page-leaderboard .tab').forEach(t => t.classList.toggle('active', t === el))
  state.lbTab = el.dataset.tab
  if (state.lbTab === 'sessions') {
    document.getElementById('lb-rank-list').innerHTML = ''
    document.getElementById('lb-bar-card').style.display = 'none'
    document.getElementById('lb-sessions-panel').classList.remove('hidden')
    if (!state.lbData) { loadLeaderboard(); return }
    renderSessionsChart()
  } else {
    document.getElementById('lb-sessions-panel').classList.add('hidden')
    if (state.lbData) renderLeaderboard()
  }
}

async function loadLeaderboard() {
  document.getElementById('lb-loading').style.display = 'block'
  document.getElementById('lb-rank-list').innerHTML = ''
  document.getElementById('lb-bar-card').style.display = 'none'
  document.getElementById('lb-sessions-panel').classList.add('hidden')

  const weekStart = getWeekStart()
  const [stuRes, weekRes, sessRes, eventsRes] = await Promise.all([
    sb.from('students').select('*').order('id'),
    sb.from('point_events').select('*').gte('created_at', weekStart),
    sb.from('sessions').select('*').order('session_date', { ascending: true }),
    sb.from('point_events').select('student_id, points, session_id').not('session_id', 'is', null)
  ])
  document.getElementById('lb-loading').style.display = 'none'
  if (stuRes.error) { showToast('加载失败'); return }

  const students = stuRes.data
  const weeklyMap = {}
  students.forEach(s => { weeklyMap[s.id] = 0 });
  (weekRes.data || []).forEach(e => { if (weeklyMap[e.student_id] !== undefined) weeklyMap[e.student_id] += e.points || 0 })

  state.lbData = {
    weekly: [...students].map(s => ({ ...s, pts: weeklyMap[s.id] || 0 })).sort((a,b) => b.pts - a.pts),
    total:  [...students].map(s => ({ ...s, pts: s.total_points || 0 })).sort((a,b) => b.pts - a.pts),
    sessions: sessRes.data || [],
    sessionEvents: eventsRes.data || [],
    students,
    weekEvents: weekRes.data || [],
  }

  if (state.lbTab === 'sessions') {
    renderSessionsChart()
  } else {
    renderLeaderboard()
  }
}

function renderLeaderboard() {
  lbBreakdownStudentId = null
  const list = state.lbData[state.lbTab]
  const maxPts = Math.max(...list.map(s => s.pts), 1)
  document.getElementById('lb-rank-list').innerHTML = list.map((s, i) => `
    <div class="rank-item" onclick="toggleLbBreakdown('${s.id}',this)">
      <span class="rank-num ${i===0?'g1':i===1?'g2':''}">${i===0?'🥇':i===1?'🥈':i+1}</span>
      <span class="rank-avatar">${s.avatar}</span>
      <div class="rank-info">
        <div class="rank-name">${s.name}</div>
        <div class="rank-sub">${state.lbTab === 'weekly' ? '本周积分' : '累计积分'}</div>
      </div>
      <span class="rank-pts">${s.pts}<span class="rank-unit"> 分</span></span>
    </div>
    <div class="rank-breakdown hidden" id="lb-bd-${s.id}"></div>`
  ).join('')

  const barCard = document.getElementById('lb-bar-card')
  barCard.style.display = 'block'
  document.getElementById('lb-bars').innerHTML = list.map(s => `
    <div class="bar-row">
      <span class="bar-name">${s.avatar} ${s.name}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(s.pts/maxPts*100)}%"></div></div>
      <span class="bar-val">${s.pts}</span>
    </div>`
  ).join('')
}

function renderSessionsChart() {
  document.getElementById('lb-sessions-panel').classList.remove('hidden')
  const { sessions, sessionEvents, students } = state.lbData
  if (!sessions || sessions.length === 0) {
    document.getElementById('session-list').innerHTML = '<div class="empty"><span class="eicon">📅</span>暂无课次数据</div>'
    const canvas = document.getElementById('session-chart')
    const ctx = canvas.getContext('2d')
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    document.getElementById('chart-legend').innerHTML = ''
    return
  }

  const sessMap = {}
  sessions.forEach(s => { sessMap[s.id] = {} })
  students.forEach(st => { sessions.forEach(s => { sessMap[s.id][st.id] = 0 }) })
  sessionEvents.forEach(e => {
    if (sessMap[e.session_id] && e.student_id in sessMap[e.session_id]) {
      sessMap[e.session_id][e.student_id] += e.points || 0
    }
  })

  const labels = sessions.map(s => s.label)
  const datasets = students.map((st, idx) => ({
    studentId: st.id, name: st.name, avatar: st.avatar,
    color: STUDENT_COLORS[idx] || '#666',
    data: sessions.map(s => sessMap[s.id][st.id] || 0),
  }))

  drawLineChart('session-chart', labels, datasets)

  document.getElementById('chart-legend').innerHTML = datasets.map(d =>
    `<span><span class="legend-dot" style="background:${d.color}"></span>${d.avatar} ${d.name}</span>`
  ).join('')

  document.getElementById('session-list').innerHTML = [...sessions].reverse().map(sess => {
    const pts = datasets.map(d => {
      const idx = sessions.findIndex(s => s.id === sess.id)
      return { name: d.name, avatar: d.avatar, val: d.data[idx] || 0, color: d.color }
    })
    return `
    <div class="sess-item">
      <span class="sess-date">${sess.label}</span>
      <span class="sess-label">${fmtDate(sess.session_date)}</span>
      <div class="sess-pts">
        ${pts.map(p => `<span class="sess-pt" style="color:${p.color}">${p.avatar}${p.val}</span>`).join('')}
      </div>
    </div>`
  }).join('')
}

function drawLineChart(canvasId, labels, datasets) {
  const canvas = document.getElementById(canvasId)
  const container = canvas.parentElement
  const W = container.clientWidth || 320
  canvas.width = W
  canvas.height = 200
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, W, 200)

  const PAD = { top: 20, right: 20, bottom: 36, left: 36 }
  const chartW = W - PAD.left - PAD.right
  const chartH = 200 - PAD.top - PAD.bottom

  const allVals = datasets.flatMap(d => d.data)
  const minVal = Math.min(0, ...allVals)
  const maxVal = Math.max(1, ...allVals)
  const range = maxVal - minVal || 1

  function xPos(i) { return PAD.left + (labels.length <= 1 ? chartW/2 : i * chartW / (labels.length - 1)) }
  function yPos(v) { return PAD.top + chartH - ((v - minVal) / range) * chartH }

  ctx.strokeStyle = '#E5E5EA'
  ctx.lineWidth = 1
  const gridCount = 4
  for (let i = 0; i <= gridCount; i++) {
    const y = PAD.top + (chartH / gridCount) * i
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke()
    const v = Math.round(maxVal - (range / gridCount) * i)
    ctx.fillStyle = '#8E8E93'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign = 'right'
    ctx.fillText(v, PAD.left - 4, y + 4)
  }

  ctx.fillStyle = '#8E8E93'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign = 'center'
  labels.forEach((l, i) => { ctx.fillText(l, xPos(i), 200 - PAD.bottom + 16) })

  datasets.forEach(d => {
    if (d.data.length === 0) return
    ctx.strokeStyle = d.color
    ctx.lineWidth = 2.5
    ctx.lineJoin = 'round'
    ctx.beginPath()
    d.data.forEach((v, i) => {
      if (i === 0) ctx.moveTo(xPos(i), yPos(v))
      else ctx.lineTo(xPos(i), yPos(v))
    })
    ctx.stroke()
    d.data.forEach((v, i) => {
      ctx.fillStyle = '#fff'
      ctx.beginPath(); ctx.arc(xPos(i), yPos(v), 4, 0, Math.PI*2); ctx.fill()
      ctx.fillStyle = d.color
      ctx.beginPath(); ctx.arc(xPos(i), yPos(v), 3, 0, Math.PI*2); ctx.fill()
      ctx.fillStyle = d.color; ctx.font = 'bold 10px -apple-system,sans-serif'; ctx.textAlign = 'center'
      ctx.fillText(v, xPos(i), yPos(v) - 8)
    })
  })
}

function getWeekStart() {
  const now = new Date()
  const day = now.getDay() === 0 ? 6 : now.getDay() - 1
  now.setDate(now.getDate() - day)
  now.setHours(0,0,0,0)
  return now.toISOString()
}

// ══════════════════════════════════════
// 奖励页
// ══════════════════════════════════════
function switchRwTab(el) {
  document.querySelectorAll('#page-rewards .tab').forEach(t => t.classList.toggle('active', t === el))
  state.rwTab = el.dataset.tab
  document.getElementById('rw-rewards-panel').classList.toggle('hidden', state.rwTab !== 'rewards')
  document.getElementById('rw-history-panel').classList.toggle('hidden', state.rwTab !== 'history')
}

async function loadRewards() {
  document.getElementById('rw-loading').style.display = 'block'
  document.getElementById('rw-content').classList.add('hidden')

  const [rwRes, stuRes, histRes] = await Promise.all([
    sb.from('rewards').select('*').eq('is_active', true).order('sort_order'),
    sb.from('students').select('*').order('id'),
    sb.from('redemptions').select('*').order('created_at', { ascending: false }).limit(50)
  ])
  document.getElementById('rw-loading').style.display = 'none'
  if (rwRes.error) { showToast('加载失败'); return }

  state.students = stuRes.data || state.students

  // admin 默认选第一个；学生默认选自己；未登录默认选第一个（只读）
  if (!isAdmin() && state.currentUser && state.currentUser.studentId) {
    state.rwSelectedStudentId = state.currentUser.studentId
  } else if (!state.rwSelectedStudentId && state.students.length > 0) {
    state.rwSelectedStudentId = state.students[0].id
  }

  // 学生切换 tab 显示自己积分；admin/guest 可切换看所有人
  document.getElementById('rw-stu-bar').innerHTML = state.students.map(s => `
    <div class="stu-chip ${state.rwSelectedStudentId === s.id ? 'active' : ''}" onclick="selectRwStudent('${s.id}')">
      ${s.avatar} ${s.name}
      <span class="chip-pts">${s.available_points||0}分</span>
    </div>`
  ).join('')

  const curStudent = state.students.find(s => s.id === state.rwSelectedStudentId)
  const curPts = curStudent ? (curStudent.available_points || 0) : 0

  document.getElementById('rw-reward-list').innerHTML = rwRes.data.length ? rwRes.data.map(r => {
    const canAfford = curPts >= r.points
    // 未登录：不能兑换；学生：只能兑换自己选中的（且只有选自己时才能点）；admin：全可
    const u = state.currentUser
    const isOwnOrAdmin = !u ? false
      : isAdmin() ? true
      : u.studentId === state.rwSelectedStudentId
    const btnDisabled = !canAfford || !isOwnOrAdmin
    const btnTitle = !u ? '请先登录' : (!isOwnOrAdmin ? '只能兑换自己的积分' : '')
    return `
    <div class="reward-item">
      <span class="rw-icon">${r.icon || '🎁'}</span>
      <div class="rw-info">
        <div class="rw-name">${r.name}</div>
        ${r.description ? `<div class="rw-desc">${r.description}</div>` : ''}
      </div>
      <div class="rw-right">
        <span class="rw-cost">${r.points} 分</span>
        <button class="rw-btn" ${btnDisabled ? 'disabled' : ''} title="${btnTitle}" onclick="redeemReward('${r.id}','${r.name}',${r.points})">兑换</button>
      </div>
    </div>`
  }).join('') : '<div class="empty"><span class="eicon">🎁</span>暂无奖励项目</div>'

  const stuMap = {}
  state.students.forEach(s => { stuMap[s.id] = s })
  document.getElementById('rw-hist-list').innerHTML = histRes.data && histRes.data.length ? histRes.data.map(r => {
    const s = stuMap[r.student_id] || {}
    return `
    <div class="hist-item">
      <span class="hi-avatar">${s.avatar || '👤'}</span>
      <div class="hi-info">
        <div class="hi-desc">${s.name || r.student_id} 兑换了「${r.reward_name}」</div>
        <div class="hi-time">${fmtDateTime(r.created_at)}</div>
      </div>
      <span class="hi-cost">-${r.points}</span>
    </div>`
  }).join('') : '<div class="empty"><span class="eicon">📋</span>暂无兑换记录</div>'

  document.getElementById('rw-content').classList.remove('hidden')
}

function selectRwStudent(id) {
  state.rwSelectedStudentId = id
  loadRewards()
}

function redeemReward(rewardId, rewardName, points) {
  const s = state.students.find(x => x.id === state.rwSelectedStudentId)
  if (!s) return
  if ((s.available_points || 0) < points) { showToast('积分不足'); return }
  showModal('确认兑换', `为 ${s.name} 兑换「${rewardName}」，消耗 ${points} 积分`, async () => {
    try {
      const { error: rErr } = await sb.from('redemptions').insert({
        student_id: s.id, reward_id: rewardId, reward_name: rewardName, points
      })
      if (rErr) throw rErr
      const { error: sErr } = await sb.from('students').update({
        available_points: (s.available_points || 0) - points,
        redeemed_points: (s.redeemed_points || 0) + points
      }).eq('id', s.id)
      if (sErr) throw sErr
      showToast('兑换成功 ✓')
      loadRewards()
    } catch(e) {
      console.error(e)
      showToast('兑换失败，请重试')
    }
  })
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('page-login').classList.contains('hidden')) {
    doLogin()
  }
})
// 默认游客模式，直接加载主页
enterApp()
</script>
